<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#181818">
<title>Video</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #181818;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 32px;
    min-height: 100svh;
  }

  .top-bar {
    background: #1e2a1e;
    border: 1px solid #2d4a2d;
    border-radius: 24px;
    padding: 9px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #ccc;
    width: 100%;
    max-width: 440px;
    margin-bottom: 14px;
  }

  .dot {
    width: 9px; height: 9px;
    background: #4caf50;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px #1e2a1e;
  }

  .green-word {
    color: #4cde6e;
    font-weight: 600;
  }

  .card {
    background: #212121;
    border-radius: 18px;
    overflow: hidden;
    width: 100%;
    max-width: 440px;
  }

  .player {
    background: #111;
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .spinner-ring {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 3px solid #2a2a2a;
    border-top-color: #4cde6e;
    animation: spin 1.1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .info-section {
    padding: 14px 14px 16px;
  }

  .loading-label {
    font-size: 14px;
    font-weight: 600;
    color: #d0d0d0;
    margin-bottom: 8px;
  }

  .progress-bg {
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-fill {
    height: 100%;
    background: #3a6cf4;
    border-radius: 2px;
    animation: prog 4s cubic-bezier(.4,0,.2,1) infinite;
  }

  @keyframes prog {
    0%   { width: 0%; }
    40%  { width: 60%; }
    75%  { width: 78%; }
    90%  { width: 84%; }
    100% { width: 84%; }
  }

  .file-card {
    background: #2a2a2a;
    border-radius: 12px;
    padding: 12px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mp4-badge {
    background: #3d7a45;
    border-radius: 8px;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .file-name {
    font-size: 14px;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 3px;
  }

  .file-meta {
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div class="dot"></div>
    Ko'rish uchun <span class="green-word">ruxsat</span> berishingiz kerak
  </div>

  <div class="card">
    <div class="player">
      <div class="spinner-ring"></div>
    </div>
    <div class="info-section">
      <div class="loading-label">Videoni yuklash...</div>
      <div class="progress-bg">
        <div class="progress-fill"></div>
      </div>
      <div class="file-card">
        <div class="mp4-badge">MP4</div>
        <div>
          <div class="file-name">VIDEO.MP4</div>
          <div class="file-meta">1920×1080 &bull; 2.0 MB</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
