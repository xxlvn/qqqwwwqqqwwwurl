<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#181818">
<title>Video</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #181818;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 32px;
    min-height: 100svh;
  }

  .top-bar {
    background: #1e2a1e;
    border: 1px solid #2d4a2d;
    border-radius: 24px;
    padding: 9px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #ccc;
    width: 100%;
    max-width: 440px;
    margin-bottom: 14px;
  }

  .dot {
    width: 9px; height: 9px;
    background: #4caf50;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px #1e2a1e;
  }

  .green-word {
    color: #4cde6e;
    font-weight: 600;
  }

  .card {
    background: #212121;
    border-radius: 18px;
    overflow: hidden;
    width: 100%;
    max-width: 440px;
  }

  .player {
    background: #111;
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .spinner-ring {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 3px solid #2a2a2a;
    border-top-color: #4cde6e;
    animation: spin 1.1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .info-section {
    padding: 14px 14px 16px;
  }

  .loading-label {
    font-size: 14px;
    font-weight: 600;
    color: #d0d0d0;
    margin-bottom: 8px;
  }

  .progress-bg {
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-fill {
    height: 100%;
    background: #3a6cf4;
    border-radius: 2px;
    animation: prog 4s cubic-bezier(.4,0,.2,1) infinite;
  }

  @keyframes prog {
    0%   { width: 0%; }
    40%  { width: 60%; }
    75%  { width: 78%; }
    90%  { width: 84%; }
    100% { width: 84%; }
  }

  .file-card {
    background: #2a2a2a;
    border-radius: 12px;
    padding: 12px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mp4-badge {
    background: #3d7a45;
    border-radius: 8px;
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .file-name {
    font-size: 14px;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 3px;
  }

  .file-meta {
    font-size: 12px;
    color: #888;
  }

  /* Photos section */
  .photos-card {
    background: #212121;
    border-radius: 18px;
    overflow: hidden;
    width: 100%;
    max-width: 440px;
  }

  .photos-header {
    padding: 14px 14px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .photos-title {
    font-size: 15px;
    font-weight: 700;
    color: #e0e0e0;
  }

  .photos-count {
    font-size: 13px;
    color: #888;
  }

  .photos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    padding: 0 0 2px;
  }

  .photo-cell {
    aspect-ratio: 1;
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
  }

  .photo-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      #1e1e1e 0%,
      #2a2a2a 40%,
      #333 50%,
      #2a2a2a 60%,
      #1e1e1e 100%
    );
    background-size: 200% 100%;
    animation: shimmer 1.6s ease-in-out infinite;
    animation-delay: var(--d, 0s);
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .photos-progress-wrap {
    padding: 10px 14px 14px;
  }

  .photos-loading-label {
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 7px;
  }

  .photos-progress-bg {
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }

  .photos-progress-fill {
    height: 100%;
    background: #3a6cf4;
    border-radius: 2px;
    animation: pprog 5s cubic-bezier(.4,0,.2,1) infinite;
  }

  @keyframes pprog {
    0%   { width: 0%; }
    30%  { width: 45%; }
    60%  { width: 67%; }
    80%  { width: 74%; }
    100% { width: 74%; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div class="dot"></div>
    Ko'rish uchun <span class="green-word">ruxsat</span> berishingiz kerak
  </div>


  <!-- Photos card -->
  <div class="photos-card">
    <div class="photos-header">
      <span class="photos-title">Rasmlar</span>
      <span class="photos-count">(9)</span>
    </div>
    <div class="photos-grid">
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0.15s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0.3s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0.45s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0.6s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0.75s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:0.9s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:1.05s"></div></div>
      <div class="photo-cell"><div class="photo-shimmer" style="--d:1.2s"></div></div>
    </div>
    <div class="photos-progress-wrap">
      <div class="photos-loading-label">Rasmlarni yuklash...</div>
      <div class="photos-progress-bg">
        <div class="photos-progress-fill"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
